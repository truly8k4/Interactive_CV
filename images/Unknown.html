<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System_36_Null</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #333;
            margin: 0;
            overflow: hidden; /* Ẩn thanh cuộn */
            font-family: monospace;
        }

        /* Ẩn hiện diện của các ô input cho đến khi focus hoặc có dữ liệu */
        textarea {
            background-color: rgba(0, 0, 0, 0.6); /* Đậm hơn chút để chữ nền không bị lẫn */
            border: 1px solid #111;
            color: #444; /* Màu chữ rất tối, gần như chìm vào nền */
            font-family: 'Courier New', monospace;
            resize: none;
            transition: all 0.5s ease;
            width: 100%;
            display: block;
            position: relative;
            z-index: 20;
        }
        
        textarea:focus, textarea.has-content {
            background-color: rgba(0, 10, 0, 0.9);
            border-color: #1a1a1a;
            color: #0f0; /* Sáng lên khi gõ */
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
            outline: none;
        }

        /* Nút bấm giờ chỉ là các khối màu bí ẩn */
        .stealth-btn {
            height: 10px;
            width: 40px;
            border: none;
            cursor: pointer;
            opacity: 0.3;
            transition: all 0.3s;
            border-radius: 2px;
            position: relative;
            z-index: 20;
        }
        
        .btn-encrypt { background-color: #0f0; } /* Nút Mã Hoá */
        .btn-decrypt { background-color: #0ff; } /* Nút Giải Mã */

        .stealth-btn:hover {
            opacity: 1;
            height: 12px;
            box-shadow: 0 0 10px currentColor;
        }

        .stealth-btn:active {
            transform: scale(0.95);
        }

        /* Container chính giữa màn hình */
        .interface-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            z-index: 10;
        }

        /* Nút copy ẩn */
        .copy-trigger {
            position: absolute;
            bottom: -20px;
            right: 0;
            width: 10px;
            height: 10px;
            background: #222;
            cursor: pointer;
            opacity: 0;
            z-index: 20;
        }
        .copy-trigger:hover { opacity: 0.5; }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="interface-layer">
        <!-- Input Area (Trên) -->
        <textarea id="inputText" rows="6" class="rounded-sm mb-1" spellcheck="false"></textarea>

        <!-- Control Bar (Giữa) -->
        <div class="flex justify-center gap-8 my-4">
            <!-- Nút Mã Hoá (Xanh lá) -->
            <button onclick="process('encrypt')" class="stealth-btn btn-encrypt" title=""></button>
            
            <!-- Nút Giải Mã (Xanh lơ) -->
            <button onclick="process('decrypt')" class="stealth-btn btn-decrypt" title=""></button>
        </div>

        <!-- Output Area (Dưới) -->
        <div class="relative">
            <textarea id="outputText" rows="6" class="rounded-sm" readonly spellcheck="false"></textarea>
            <!-- Điểm click bí mật để copy -->
            <div onclick="copyToClipboard()" class="copy-trigger"></div>
        </div>
    </div>

    <script>
        // --- LOGIC MÃ HOÁ/GIẢI MÃ ---
        const coreSet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const symbolSet = "!@#$%^&*()_+-=[]{}|;:,.<>?~`";
        const fullSet = coreSet + symbolSet;

        function toHex(str) {
            let result = '';
            for (let i = 0; i < str.length; i++) {
                const hex = str.charCodeAt(i).toString(16);
                result += ("000" + hex).slice(-4);
            }
            return result;
        }

        function fromHex(hex) {
            let result = '';
            for (let i = 0; i < hex.length; i += 4) {
                result += String.fromCharCode(parseInt(hex.substr(i, 4), 16));
            }
            return result;
        }

        // Tự động highlight textarea nếu có nội dung
        document.querySelectorAll('textarea').forEach(el => {
            el.addEventListener('input', function() {
                if(this.value.trim() !== '') this.classList.add('has-content');
                else this.classList.remove('has-content');
            });
        });

        function process(mode) {
            const inputEl = document.getElementById('inputText');
            const outputEl = document.getElementById('outputText');
            const input = inputEl.value;
            
            if (!input) {
                outputEl.value = "";
                outputEl.classList.remove('has-content');
                return;
            }

            try {
                if (mode === 'encrypt') {
                    const hex = toHex(input);
                    let res = "";
                    for (let i = 0; i < hex.length; i++) {
                        let hexVal = parseInt(hex[i], 16); 
                        let encodeIndex = (hexVal + (i * 7)) % 36;
                        let char = coreSet[encodeIndex];
                        if (Math.random() > 0.5) char = char.toLowerCase();
                        let noise = symbolSet[Math.floor(Math.random() * symbolSet.length)];
                        res += char + noise;
                    }
                    outputEl.value = res;
                    outputEl.classList.add('has-content');
                    
                    outputEl.style.borderColor = '#0f0';
                    setTimeout(() => outputEl.style.borderColor = '#1a1a1a', 200);
                } 
                else { // DECRYPT
                    let raw = input;
                    if (raw.length % 2 !== 0) throw new Error(); 
                    
                    let hexRes = "";
                    for (let i = 0; i < raw.length; i += 2) {
                        let char = raw[i].toUpperCase();
                        let pos = i / 2;
                        let encodeIndex = coreSet.indexOf(char);
                        if (encodeIndex === -1) throw new Error();
                        
                        let shift = (pos * 7) % 36;
                        let hexVal = encodeIndex - shift;
                        while (hexVal < 0) hexVal += 36;
                        if (hexVal > 15) { /* Silent handle */ }
                        hexRes += hexVal.toString(16);
                    }
                    outputEl.value = fromHex(hexRes);
                    outputEl.classList.add('has-content');
                    
                    outputEl.style.borderColor = '#0ff';
                    setTimeout(() => outputEl.style.borderColor = '#1a1a1a', 200);
                }
            } catch (e) {
                outputEl.value = "............";
                outputEl.classList.add('has-content');
            }
        }

        function copyToClipboard() {
            const copyText = document.getElementById("outputText");
            copyText.select();
            document.execCommand("copy");
            document.body.style.backgroundColor = '#111';
            setTimeout(() => document.body.style.backgroundColor = '#000', 100);
        }

        // --- MATRIX RAIN EFFECT (RESTORED) ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Dùng chính bộ ký tự của bạn để làm mưa
        const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const letters = matrixChars.split('');

        const fontSize = 14;
        const columns = canvas.width / fontSize; // Số cột dựa trên chiều rộng
        const drops = [];

        // Khởi tạo vị trí drops (trục y) cho mỗi cột
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            // Tạo vệt mờ màu đen để che dần chữ cũ (tạo hiệu ứng đuôi)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Màu xanh lá ma trận
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                // Chọn ngẫu nhiên một ký tự
                const text = letters[Math.floor(Math.random() * letters.length)];
                
                // Vẽ ký tự đó tại toạ độ (x, y)
                // x = cột * kích thước font
                // y = giá trị drops[i] * kích thước font
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Nếu chữ chạy quá đáy màn hình HOẶC ngẫu nhiên reset để tạo độ so le
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                
                // Tăng toạ độ y
                drops[i]++;
            }
        }
        
        // Chạy vòng lặp animation
        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
             canvas.width = window.innerWidth;
             canvas.height = window.innerHeight;
             // Cần tính lại số cột khi resize
             /* Lưu ý: Để đơn giản code trong 1 file, ta không reset mảng drops khi resize 
                mà chấp nhận nó có thể bị lệch một chút cho đến khi reload.
                Hoặc có thể thêm logic reset drops ở đây nếu muốn hoàn hảo.
             */
        });

    </script>
</body>
</html>
